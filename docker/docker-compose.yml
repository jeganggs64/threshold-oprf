# =============================================================================
# docker-compose.yml -- Local development / testing cluster
#
# Runs a 3-node threshold OPRF cluster behind a proxy, with mTLS certificates
# mounted from the local ./certs directory.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# The proxy is reachable at https://localhost:3000.
# Individual nodes are only reachable within the Docker network (not exposed to host).
#
# Certificate directory layout (generated by scripts/gen-certs.sh):
#   certs/ca/ca.pem, certs/ca/ca.key
#   certs/nodes/node1.pem, certs/nodes/node1.key (etc)
#   certs/proxy/proxy-client.pem, certs/proxy/proxy-client.key
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Proxy -- aggregates partial OPRF evaluations from the node quorum
  # ---------------------------------------------------------------------------
  proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    container_name: toprf-proxy
    ports:
      - "3000:3000"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/toprf/data
    environment:
      RUST_LOG: info
    command:
      - "--config"
      - "/etc/toprf/proxy-config.json"
      - "--port"
      - "3000"
    volumes:
      - ../certs:/etc/toprf/certs:ro
      - ./proxy-config.json:/etc/toprf/proxy-config.json:ro
    networks:
      - toprf-net
    depends_on:
      node-1:
        condition: service_started
      node-2:
        condition: service_started
      node-3:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 1
  # ---------------------------------------------------------------------------
  node-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-1
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "1"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--tls-cert"
      - "/etc/toprf/certs/nodes/node1.pem"
      - "--tls-key"
      - "/etc/toprf/certs/nodes/node1.key"
      - "--client-ca"
      - "/etc/toprf/certs/ca/ca.pem"
    volumes:
      - ../certs:/etc/toprf/certs:ro
    networks:
      - toprf-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 2
  # ---------------------------------------------------------------------------
  node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-2
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "2"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--tls-cert"
      - "/etc/toprf/certs/nodes/node2.pem"
      - "--tls-key"
      - "/etc/toprf/certs/nodes/node2.key"
      - "--client-ca"
      - "/etc/toprf/certs/ca/ca.pem"
    volumes:
      - ../certs:/etc/toprf/certs:ro
    networks:
      - toprf-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 3
  # ---------------------------------------------------------------------------
  node-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-3
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "3"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--tls-cert"
      - "/etc/toprf/certs/nodes/node3.pem"
      - "--tls-key"
      - "/etc/toprf/certs/nodes/node3.key"
      - "--client-ca"
      - "/etc/toprf/certs/ca/ca.pem"
    volumes:
      - ../certs:/etc/toprf/certs:ro
    networks:
      - toprf-net
    restart: unless-stopped

networks:
  toprf-net:
    driver: bridge
